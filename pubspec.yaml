name: stremini
description: Stremini Workspace Suite

publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  # Google Sign-In
  google_sign_in: ^6.2.1

  # HTTP
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Fonts
  google_fonts: ^6.2.1

  # URL launcher
  url_launcher: ^6.3.0

  # UUID
  uuid: ^4.4.0

  # Shared preferences (for local caching)
  shared_preferences: ^2.3.2

  # Flutter markdown
  flutter_markdown: ^0.7.3
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  